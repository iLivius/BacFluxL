links:
 checkv_link: https://portal.nersc.gov/CheckV/checkv-db-v1.5.tar.gz
 dbcan_link: https://zenodo.org/records/18622157/files/dbcan_db_v5.1.2.tar.gz
directories:
  input_dir: /path/to/input_dir
  output_dir: /path/to/output_dir
  bakta_db: /path/to/bakta_6.0/db
  blast_db: /path/to/NCBI_core_nt
  eggnog_db: /path/to/eggnog
  gtdbtk_db: /path/to/GTDB/release226
  platon_db: /path/to/platon/db
resources:
  threads: 24
parameters:
  nt_version: core_nt
  flye_input_mode: auto # Options: auto, nano-raw, nano-hq
  medaka_model: auto # auto/TRUE/empty = infer from FASTQ headers; FALSE = skip; explicit model = use that model
  decontamination:
    mode: auto # Options: auto, include, exclude, off
    discard_no_hit: true
    include_genera:
    include_genera_by_sample:
    exclude_genera:
    exclude_genera_file:
    sample_overrides:
